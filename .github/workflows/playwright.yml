name: Tests Playwright Cucumber

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright
      run: npx playwright install chromium --with-deps
    
    - name: 🔧 Créer le fichier env.ts manquant
      run: |
        echo "📁 Création du dossier helper/env..."
        mkdir -p src/helper/env
        
        echo "📝 Création du fichier env.ts..."
        cat > src/helper/env/env.ts << 'EOF'
        /**
         * Configuration de l'environnement pour les tests
         */
        
        export interface EnvConfig {
          ENV: string;
          BASE_URL: string;
        }
        
        export const env: EnvConfig = {
          ENV: process.env.ENV || 'prod',
          BASE_URL: process.env.BASE_URL || 'https://example.com',
        };
        
        export default env;
        EOF
        
        echo "✅ Fichier créé avec succès !"
        echo "📄 Contenu du fichier :"
        cat src/helper/env/env.ts
    
    - name: Run tests
      run: npm test
      continue-on-error: true
    
    - name: Upload test reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports
        path: |
          test-results/
          playwright-report/
