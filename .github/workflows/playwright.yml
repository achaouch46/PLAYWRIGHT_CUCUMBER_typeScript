name: Playwright Cucumber Tests

# Déclenchement manuel avec paramètre
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Nom de la branche à tester'
        required: true
        default: 'main'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout de la branche spécifiée
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch }}

      # 2️⃣ Installer Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3️⃣ Installer les dépendances
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Installer les navigateurs Playwright
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 5️⃣ Lancer les tests
      - name: Run tests
        run: npm run test

      # 6️⃣ Upload du rapport HTML
      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: playwright-report