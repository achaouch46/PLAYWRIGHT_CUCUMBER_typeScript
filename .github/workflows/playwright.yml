name: Playwright Cucumber Tests

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to test'
        required: true
        default: 'main'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install system dependencies for Playwright
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk-bridge2.0-0 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libasound2 \
            libatk1.0-0 \
            libcups2 \
            libdrm2 \
            libxss1 \
            libffi-dev \
            libx264-dev \
            libwayland-client0 \
            libwayland-cursor0 \
            libwayland-egl1 \
            libgl1 \
            libpangocairo-1.0-0 \
            libpango-1.0-0 \
            libxkbcommon0 \
            libxcb1 \
            libx11-6 \
            libxcb-dri3-0 \
            libxcb-present0 \
            libxcb-shm0 \
            libxcb-xfixes0

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run tests
        run: npm run test

      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report