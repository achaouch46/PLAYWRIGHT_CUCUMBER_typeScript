name: Tests Playwright Cucumber

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-22.04  # SOLUTION: Changer ubuntu-latest en ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright
      run: npx playwright install chromium --with-deps  # Maintenant ça marche avec ubuntu-22.04
    
    - name: Run tests
      run: npm test
      continue-on-error: true
    
    - name: Upload test reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports
        path: |
          test-results/
          playwright-report/
    
    - name: Liste des rapports
      if: always()
      run: |
        echo "📁 Rapports disponibles :"
        ls -la test-results/ || echo "Pas de dossier test-results"
        ls -la playwright-report/ || echo "Pas de dossier playwright-report"